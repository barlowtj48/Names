services:
  names-db:
    container_name: names-db
    platform: linux/amd64
    image: postgres:16.1-alpine
    restart: no
    env_file:
      - ./secrets/names.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME}"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      PGPORT: ${DATABASE_PORT}
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    volumes:
      - names-data:/var/lib/postgresql/data/
    networks:
      - names-network

  names-backend:
    container_name: names-backend
    build:
      dockerfile: backend/dev.Dockerfile
    restart: no
    env_file:
      - ./secrets/names.env
    environment:
      - ENV=development
      - DOMAIN=${DOMAIN}
      - BACKEND_PORT=${BACKEND_PORT}
      - DATABASE_HOST=names-db
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD_BCRYPT=${ADMIN_PASSWORD_BCRYPT}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - VOTER_SALT=${VOTER_SALT}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
      - "2345:2345"
    volumes:
      - ./go.mod:/app/go.mod
      - ./go.sum:/app/go.sum
      - ./backend:/app/backend
      - ./shared:/app/shared
    depends_on:
      names-db:
        condition: service_healthy
    networks:
      - names-network

volumes:
  names-data:

networks:
  names-network:
    driver: bridge
