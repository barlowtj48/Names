name: Build Image

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-build-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  build_backend_image:
    name: Build and Push Backend Image
    runs-on:
      - self-hosted
      - docker
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - name: Clean up
        uses: AutoModality/action-clean@v1
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Task
        uses: arduino/setup-task@v2
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.thomasjbarlow.com
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
      - name: Create Build-time Config
        run: |
          mkdir -p ./secrets
          cat > ./secrets/names.env << EOF
          DOMAIN=${{ vars.DOMAIN || 'names.thomasjbarlow.com' }}
          BACKEND_PORT=${{ vars.BACKEND_PORT || '8104' }}
          DATABASE_PORT=${{ vars.DATABASE_PORT || '5432' }}
          EOF
      - name: Build and Push Backend Image
        run: task build:prod:backend:tag -- ${{ github.event.number }}
