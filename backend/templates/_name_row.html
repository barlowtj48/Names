{{ define "name_row" }}
<div
  class="name-row name-row--{{ .Status }}"
  id="name-{{ .ID }}"
  data-name="{{ .Text }}"
>
  <div class="name-text">
    <button
      type="button"
      class="speak"
      title="Speak this name"
      aria-label="Speak {{ .Text }}"
      data-speak="{{ .Text }}"
    >
      🔊
    </button>
    <span class="name-label">{{ .Text }}</span>
    <time
      class="name-time"
      datetime="{{ .CreatedAt.UTC.Format "2006-01-02T15:04:05Z" }}"
      title="{{ .CreatedAt.Format "Jan 2, 2006 3:04 PM" }}"
      data-rel
    >{{ .CreatedAt.Format "Jan 2, 2006" }}</time>
  </div>
  <div class="vote-controls">
    {{ if eq .Status "active" }}{{ if not .MyFlag }}
    <button
      class="flag"
      title="Flag as offensive"
      hx-post="/api/names/{{ .ID }}/flag"
      hx-target="#name-{{ .ID }}"
      hx-swap="outerHTML"
      hx-confirm="Flag this name as offensive? After enough flags it disappears from the public list until a moderator reviews it."
      hx-include="#filter-form"
    >
      🚩
    </button>
    {{ end }}{{ end }}
    <button
      class="vote up{{ if eq .MyVote 1 }} active{{ end }}"
      hx-post="/api/names/{{ .ID }}/vote"
      hx-vals='{"value": {{ if eq .MyVote 1 }}0{{ else }}1{{ end }} }'
      hx-target="#name-{{ .ID }}"
      hx-swap="outerHTML"
      hx-include="#filter-form"
    >
      👍 <span class="count">{{ .Up }}</span>
    </button>
    <span class="score" title="net score">{{ .Score }}</span>
    <button
      class="vote down{{ if eq .MyVote -1 }} active{{ end }}"
      hx-post="/api/names/{{ .ID }}/vote"
      hx-vals='{"value": {{ if eq .MyVote -1 }}0{{ else }}-1{{ end }} }'
      hx-target="#name-{{ .ID }}"
      hx-swap="outerHTML"
      hx-include="#filter-form"
    >
      👎 <span class="count">{{ .Down }}</span>
    </button>
  </div>
</div>
{{ end }} {{ template "name_row" .N }}
